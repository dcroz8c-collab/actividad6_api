<div class="container-fluid px-0">

  <div style="background-color: #2d3561; padding: 28px 40px;">
    <div class="container d-flex justify-content-between align-items-center">
      <div>
        <p class="mb-0" style="color: #a0b0e0; font-size: 20px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500;">Panel de gestión</p>
        <h1 class="mb-0 fw-semibold" style="color: white; font-size: 40px;">Usuarios</h1>
      </div>
      <a routerLink="/nuevo-usuario" class="btn px-4 py-2"
         style="background-color: transparent; color: white; border: 2px solid white; border-radius: 8px; font-size: 22px; font-weight: 600;">
        + Nuevo usuario
      </a>
    </div>
  </div>

  <div class="container mt-4">
    <div class="row g-3">
      @for (user of usersList(); track user._id) {
        <div class="col-12 col-md-4 col-lg-3">
          <div class="card border-0 h-100" style="border-radius: 16px; overflow: hidden; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.07);">
            <img [src]="user.image" class="card-img-top" [alt]="user.first_name"
                 style="height: 200px; object-fit: cover;">
                <div class="card-body text-center px-3 py-3 d-flex flex-column">
                  <h6 class="mb-1 fw-bold" style="font-size: 30px; min-height: 80px;">
                    {{ user.first_name }} {{ user.last_name }}
                  </h6>
                  <p class="mb-3" style="font-size: 15px; color: #888;">{{ user.email }}</p>
                  <div class="mt-auto d-flex gap-1 justify-content-center">
                    <a [routerLink]="['/usuario', user._id]" class="btn btn-sm px-3 py-2"
                      style="background-color: #2d3561; color: white; font-size: 14px; border-radius: 6px;">
                      Ver detalle
                    </a>
                    <a [routerLink]="['/updateuser', user._id]" class="btn btn-sm px-3 py-2"
                      style="background-color: #4a5899; color: white; font-size: 14px; border-radius: 6px;">
                      Editar
                    </a>
                    <button (click)="deleteUser(user)" class="btn btn-sm px-3 py-2"
                            style="background-color: #e63946; color: white; font-size: 14px; border-radius: 6px;">
                      Borrar
                    </button>
                  </div>
</div>
          </div>
        </div>
      } @empty {
        <div class="col-12 text-center mt-5">
          <p style="color: #999; font-size: 16px;">Cargando usuarios...</p>
        </div>
      }
    </div>
  </div>

</div>
